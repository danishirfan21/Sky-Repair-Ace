<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sky Repair Ace - Near Miss + Last Stand</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="flash"></div><div id="compositionVignette"></div><div id="vignette"></div>
<div id="hud">
  <div id="stateVault" aria-hidden="true">
    <span id="score">0</span>
    <span id="time">0.0</span>
    <span id="kills">0</span>
    <span id="nearCount">0</span>
    <span id="maxCombo">0</span>
    <span id="enemyCount">0</span>
    <span id="weaponRule">Combo x0</span>
  </div>

  <div id="threatRadar" class="threat-radar" aria-hidden="true">
    <div class="radar-face">
      <span class="radar-ring radar-ring-one"></span>
      <span class="radar-ring radar-ring-two"></span>
      <span class="radar-axis radar-axis-x"></span>
      <span class="radar-axis radar-axis-y"></span>
      <span class="radar-sweep"></span>
      <span class="radar-player"></span>
      <div id="radarBlips" class="radar-blips"></div>
    </div>
  </div>

  <div id="weapon" class="combat-cluster" aria-hidden="true">
    <div class="hull-line">
      <span>HULL</span>
      <span><span id="hp">100</span>%</span>
    </div>
    <div class="hull-track"><span id="hullBar"></span></div>
    <div class="weapon-line">
      <span id="weaponName">Single Shot</span>
      <span class="ammo-infinity">∞</span>
    </div>
    <div class="repair-line">
      <span id="repairLabel">REPAIR</span>
      <span id="repairCompact" class="repair-key">R</span>
    </div>
  </div>

  <div id="comboBadge">
    <span id="comboBadgeValue">x0</span>
    <span id="comboBadgeLabel">COMBO</span>
    <span id="comboCharge"></span>
  </div>
  <div id="aimReticle" class="aim-reticle" aria-hidden="true">
    <span class="reticle-tick"></span>
    <span class="reticle-tick"></span>
    <span class="reticle-tick"></span>
    <span class="reticle-tick"></span>
  </div>
  <div id="rewardFeed" aria-hidden="true"></div>
  <div id="warn">CRITICAL</div>
  <div id="nearMiss">NEAR MISS +25</div>
  <div id="repairBox" class="repair-indicator" aria-hidden="true">
    <svg class="repair-dial" viewBox="0 0 64 64">
      <circle class="repair-track" cx="32" cy="32" r="26"></circle>
      <circle id="repairRing" class="repair-ring" cx="32" cy="32" r="26"></circle>
    </svg>
    <div id="repairIcon" class="repair-icon"><span></span></div>
    <div id="status" class="repair-status">HOLD R TO REPAIR</div>
  </div>
  <div id="controls" class="start-hint">WASD move · LMB/Space fire · Hold R repair</div>
</div>
<div id="lastStand">
  <div id="card">
    <div id="card-inner">
      <h1>LAST STAND</h1>
      <div id="resultLine">You went down fighting.</div>
      <div id="recordBadges" class="record-badges" aria-live="polite"></div>
      <div class="stats">
        <div class="stat"><b id="finalTime">0.0s</b><span>Survival Time</span></div>
        <div class="stat"><b id="finalKills">0</b><span>Planes Downed</span></div>
        <div class="stat"><b id="finalCombo">x0</b><span>Max Repair Combo</span></div>
        <div class="stat"><b id="finalNear">0</b><span>Near Misses</span></div>
      </div>
      <button id="restart">Fly Again</button>
    </div>
  </div>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
